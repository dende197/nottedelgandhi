<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Laboratorio Arcano — Esplora e Scopri</title>
    <meta name="description"
        content="Un laboratorio alchemico interattivo: clicca sugli oggetti, scopri le loro storie e risolvi il mistero!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a844;
            --gold-light: #f0d080;
            --gold-dark: #a07830;
            --bg-dark: #0a0608;
            --bg-card: rgba(15, 12, 25, 0.92);
            --bg-glass: rgba(20, 15, 35, 0.85);
            --text-primary: #e8dcc8;
            --text-secondary: #b0a090;
            --accent-green: #44aa66;
            --accent-purple: #7744aa;
            --shadow-deep: 0 8px 32px rgba(0, 0, 0, 0.7);
            --font-title: 'Cinzel Decorative', serif;
            --font-body: 'EB Garamond', serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden {
            display: none !important;
        }

        /* ── INTRO ── */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1428 0%, #0a0810 70%, #000005 100%);
            animation: introGlow 4s ease-in-out infinite alternate;
        }

        @keyframes introGlow {
            0% {
                background: radial-gradient(ellipse at center, #1a1428 0%, #0a0810 70%, #000005 100%);
            }

            100% {
                background: radial-gradient(ellipse at center, #201838 0%, #0c0a14 70%, #000008 100%);
            }
        }

        .intro-particles {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 20% 30%, rgba(212, 168, 68, 0.4), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(212, 168, 68, 0.3), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(100, 140, 255, 0.3), transparent),
                radial-gradient(2px 2px at 80% 50%, rgba(212, 168, 68, 0.2), transparent),
                radial-gradient(2px 2px at 50% 50%, rgba(119, 68, 170, 0.3), transparent);
            background-size: 300px 300px, 400px 400px, 350px 350px, 250px 250px, 320px 320px;
            animation: particleDrift 20s linear infinite;
        }

        @keyframes particleDrift {
            0% {
                transform: translateY(0) translateX(0);
            }

            100% {
                transform: translateY(-300px) translateX(50px);
            }
        }

        .intro-content {
            text-align: center;
            z-index: 1;
            animation: fadeInUp 1.5s ease-out;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-title {
            font-family: var(--font-title);
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(212, 168, 68, 0.5), 0 0 60px rgba(212, 168, 68, 0.2);
            animation: titleShimmer 3s ease-in-out infinite alternate;
        }

        @keyframes titleShimmer {
            0% {
                text-shadow: 0 0 20px rgba(212, 168, 68, 0.5), 0 0 60px rgba(212, 168, 68, 0.2);
            }

            100% {
                text-shadow: 0 0 30px rgba(212, 168, 68, 0.7), 0 0 80px rgba(212, 168, 68, 0.3);
            }
        }

        .intro-subtitle {
            font-family: var(--font-body);
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out 0.5s forwards;
        }

        #start-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            background: linear-gradient(135deg, rgba(212, 168, 68, 0.2), rgba(119, 68, 170, 0.2));
            border: 2px solid var(--gold);
            border-radius: 50px;
            color: var(--gold-light);
            font-family: var(--font-title);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeInUp 1.5s ease-out 1s forwards;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(212, 168, 68, 0.4);
            background: linear-gradient(135deg, rgba(212, 168, 68, 0.35), rgba(119, 68, 170, 0.35));
        }

        .btn-icon {
            font-size: 1.4rem;
            animation: orbFloat 2s ease-in-out infinite;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        #intro-screen.fade-out {
            animation: fadeOut 1s ease-in-out forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                pointer-events: none;
            }
        }

        /* ── SCENE ── */
        #scene-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            z-index: 1;
        }

        .scene-wrapper {
            position: relative;
            width: min(100vw, calc(100vh * 1.7927));
            aspect-ratio: 1280 / 714;
            overflow: hidden;
            flex-shrink: 0;
        }

        .scene-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            object-fit: fill;
        }

        #vignette-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.55) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* ── MASK LAYER ── */
        .mask-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /*
         * ═══════════════════════════════════════════════════════
         * GLOW SYSTEM — come funziona davvero
         * ═══════════════════════════════════════════════════════
         *
         * .hotspot-glow-wrap  → wrapper senza maschera, riceve il
         *                        filter:drop-shadow che "esce" fuori
         *
         * .hotspot-glow-inner → figlio con mask-image e background
         *                        colorato: la maschera ritaglia la
         *                        sagoma, i pixel colorati esistono,
         *                        drop-shadow sul padre li illumina
         *                        proiettando luce oltre il bordo.
         *
         * opacity sul wrapper → quasi zero = non si vede il "fill"
         *                        ma il drop-shadow esterno sì
         * ═══════════════════════════════════════════════════════
         */
        .hotspot-glow-wrap {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.22s ease;
            /* drop-shadow sul wrapper: viene proiettato FUORI dalla sagoma */
            filter:
                drop-shadow(0 0 8px rgba(255, 210, 80, 1.0)) drop-shadow(0 0 18px rgba(255, 185, 50, 0.85)) drop-shadow(0 0 32px rgba(255, 160, 30, 0.65)) drop-shadow(0 0 48px rgba(255, 140, 10, 0.40));
        }

        .hotspot-glow-inner {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            /* colore dorato: i pixel esistono → drop-shadow funziona */
            background: rgba(255, 220, 100, 0.08);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        /* Hover: glow visibile ma delicato */
        .hotspot-glow-wrap.hover {
            opacity: 0.75;
        }

        /* Active/click: glow pieno + pulse */
        .hotspot-glow-wrap.active {
            opacity: 1;
            animation: glowPulse 1.6s ease-in-out infinite;
        }

        @keyframes glowPulse {

            0%,
            100% {
                opacity: 1;
                filter: drop-shadow(0 0 8px rgba(255, 210, 80, 1.0)) drop-shadow(0 0 18px rgba(255, 185, 50, 0.85)) drop-shadow(0 0 32px rgba(255, 160, 30, 0.65)) drop-shadow(0 0 48px rgba(255, 140, 10, 0.40));
            }

            50% {
                opacity: 1;
                filter: drop-shadow(0 0 12px rgba(255, 220, 100, 1.0)) drop-shadow(0 0 28px rgba(255, 200, 70, 0.90)) drop-shadow(0 0 50px rgba(255, 175, 40, 0.75)) drop-shadow(0 0 70px rgba(255, 150, 20, 0.50));
            }
        }

        /* Discovered: verde tenue */
        .hotspot-glow-wrap.discovered {
            opacity: 0.45;
            filter:
                drop-shadow(0 0 6px rgba(100, 255, 180, 0.80)) drop-shadow(0 0 16px rgba(80, 220, 160, 0.55)) drop-shadow(0 0 28px rgba(60, 190, 130, 0.35));
        }

        /* ── HOTSPOT ── */
        .hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 5;
        }

        .hotspot.hint-highlight::after {
            content: '';
            position: absolute;
            inset: -8px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            animation: hintPulse 1s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes hintPulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.08);
            }
        }

        /* ── PARTICLES ── */
        #particle-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 8;
        }

        #click-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-body);
            color: rgba(212, 168, 68, 0.5);
            font-size: clamp(0.7rem, 1.2vw, 1rem);
            letter-spacing: 0.18em;
            font-style: italic;
            opacity: 0;
            pointer-events: none;
            z-index: 12;
            animation: hintFadeIn 2.5s ease 2s forwards;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            white-space: nowrap;
        }

        @keyframes hintFadeIn {
            to {
                opacity: 1;
            }
        }

        .click-particle {
            position: fixed;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #f0c040;
            pointer-events: none;
            animation: floatParticle 0.9s ease-out forwards;
            z-index: 999;
            box-shadow: 0 0 6px rgba(240, 192, 64, 0.8);
        }

        @keyframes floatParticle {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(var(--dx), -45px) scale(0);
            }
        }

        /* ── MODAL ── */
        #modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: modalOverlayIn 0.4s ease;
        }

        @keyframes modalOverlayIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        #modal {
            position: relative;
            max-width: 520px;
            width: 90%;
            background: linear-gradient(145deg, rgba(20, 15, 35, 0.95), rgba(10, 8, 20, 0.98));
            border: 1px solid rgba(212, 168, 68, 0.3);
            border-radius: 20px;
            padding: 40px 36px 32px;
            box-shadow: 0 0 40px rgba(212, 168, 68, 0.15), var(--shadow-deep);
            animation: modalSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalSlideIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.8rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #modal-close:hover {
            color: var(--gold);
            background: rgba(212, 168, 68, 0.1);
        }

        #modal-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 12px;
            animation: iconSpin 0.8s ease-out;
        }

        @keyframes iconSpin {
            0% {
                transform: rotateY(-180deg) scale(0.5);
                opacity: 0;
            }

            100% {
                transform: rotateY(0deg) scale(1);
                opacity: 1;
            }
        }

        #modal-title {
            font-family: var(--font-title);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 8px;
        }

        #modal-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto 20px;
        }

        #modal-story {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 24px;
        }

        #modal-clue {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 18px;
            background: rgba(212, 168, 68, 0.08);
            border: 1px solid rgba(212, 168, 68, 0.2);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .clue-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        #modal-clue-text {
            font-size: 0.95rem;
            color: var(--gold-light);
            font-style: italic;
            line-height: 1.5;
        }

        #modal-badge {
            text-align: center;
            color: var(--accent-green);
            font-family: var(--font-title);
            font-size: 0.9rem;
            font-weight: 700;
            animation: badgePop 0.5s ease 0.3s both;
        }

        @keyframes badgePop {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            60% {
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── PROGRESS ── */
        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: linear-gradient(180deg, transparent, rgba(10, 8, 18, 0.9) 30%, rgba(10, 8, 18, 0.95));
            padding: 16px 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .progress-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .progress-items {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .progress-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            filter: grayscale(1) opacity(0.4);
            transition: all 0.5s ease;
        }

        .progress-item.found {
            filter: grayscale(0) opacity(1);
            border-color: var(--gold);
            background: rgba(212, 168, 68, 0.15);
            box-shadow: 0 0 12px rgba(212, 168, 68, 0.3);
            animation: itemFound 0.6s ease;
        }

        @keyframes itemFound {
            0% {
                transform: scale(0.5) rotate(-180deg);
            }

            60% {
                transform: scale(1.3) rotate(10deg);
            }

            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        /* ── BUTTONS ── */
        #hint-btn,
        #reset-btn,
        #journal-btn {
            position: fixed;
            z-index: 50;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-glass);
            border: 1px solid rgba(212, 168, 68, 0.25);
            color: var(--gold);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        #hint-btn {
            top: 20px;
            right: 20px;
        }

        #reset-btn {
            top: 20px;
            right: 78px;
        }

        #journal-btn {
            top: 20px;
            right: 136px;
        }

        #hint-btn:hover,
        #reset-btn:hover,
        #journal-btn:hover {
            background: rgba(212, 168, 68, 0.2);
            box-shadow: 0 0 20px rgba(212, 168, 68, 0.3);
            transform: scale(1.1);
        }

        #journal-btn.has-new::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 8px rgba(68, 170, 102, 0.6);
            animation: notifPulse 2s ease-in-out infinite;
        }

        @keyframes notifPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }

        /* ── JOURNAL ── */
        #journal-panel {
            position: fixed;
            inset: 0;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
        }

        .journal-inner {
            max-width: 560px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            background: linear-gradient(145deg, rgba(25, 18, 40, 0.97), rgba(12, 8, 22, 0.99));
            border: 1px solid rgba(212, 168, 68, 0.25);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 0 50px rgba(212, 168, 68, 0.1);
            animation: modalSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .journal-inner::-webkit-scrollbar {
            width: 6px;
        }

        .journal-inner::-webkit-scrollbar-thumb {
            background: rgba(212, 168, 68, 0.25);
            border-radius: 3px;
        }

        .journal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(212, 168, 68, 0.15);
        }

        .journal-title {
            font-family: var(--font-title);
            font-size: 1.3rem;
            color: var(--gold);
        }

        #journal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.6rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        #journal-close:hover {
            color: var(--gold);
            background: rgba(212, 168, 68, 0.1);
        }

        .journal-entry {
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid rgba(212, 168, 68, 0.12);
            background: rgba(212, 168, 68, 0.03);
        }

        .journal-entry.locked {
            opacity: 0.4;
            border-color: rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        .journal-entry-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .journal-entry-icon {
            font-size: 1.3rem;
        }

        .journal-entry-name {
            font-family: var(--font-title);
            font-size: 0.95rem;
            color: var(--gold);
        }

        .journal-entry.locked .journal-entry-name {
            color: var(--text-secondary);
        }

        .journal-entry-clue {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--gold-light);
            line-height: 1.5;
            padding-left: 32px;
        }

        .journal-entry.locked .journal-entry-clue {
            color: var(--text-secondary);
        }

        /* ── TOOLTIP ── */
        .hint-tooltip {
            position: fixed;
            top: 76px;
            right: 20px;
            z-index: 60;
            background: var(--bg-card);
            border: 1px solid rgba(212, 168, 68, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: var(--text-primary);
            max-width: 280px;
            box-shadow: var(--shadow-deep);
            animation: tooltipIn 0.3s ease;
        }

        @keyframes tooltipIn {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint-tooltip.fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        /* ── CELEBRATION ── */
        #celebration-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
        }

        #confetti-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .celebration-content {
            z-index: 1;
            text-align: center;
            animation: celebrationIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 600px;
            padding: 20px;
        }

        @keyframes celebrationIn {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .celebration-title {
            font-family: var(--font-title);
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 168, 68, 0.5);
            margin-bottom: 1rem;
        }

        .celebration-subtitle {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        #final-message {
            background: rgba(212, 168, 68, 0.08);
            border: 1px solid rgba(212, 168, 68, 0.25);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--gold-light);
            font-style: italic;
        }

        #celebration-close {
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            border: none;
            border-radius: 50px;
            color: #0a0a12;
            font-family: var(--font-title);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #celebration-close:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(212, 168, 68, 0.5);
        }

        @media (max-width: 768px) {
            #modal {
                padding: 32px 24px 24px;
            }

            .progress-item {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }

            #hint-btn,
            #reset-btn,
            #journal-btn {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }

            #hint-btn {
                top: 14px;
                right: 14px;
            }

            #reset-btn {
                top: 14px;
                right: 62px;
            }

            #journal-btn {
                top: 14px;
                right: 110px;
            }
        }
    </style>
</head>

<body>

    <div id="intro-screen">
        <div class="intro-particles"></div>
        <div class="intro-content">
            <h1 class="intro-title">Il Laboratorio Arcano</h1>
            <p class="intro-subtitle">Esplora gli oggetti e scopri i segreti dell'alchimia...</p>
            <button id="start-btn">
                <span class="btn-icon">🔮</span>
                <span>Inizia l'Esplorazione</span>
            </button>
        </div>
    </div>

    <div id="scene-container">
        <div class="scene-wrapper" id="scene">
            <video class="scene-bg" autoplay loop muted playsinline>
                <source src="Animated_elements_in_static_scene_63f6e98135.mp4" type="video/mp4">
            </video>
            <div id="vignette-overlay"></div>
            <div class="mask-layer" id="maskLayer"></div>
            <canvas id="particle-canvas"></canvas>
            <div id="click-hint">✦ &nbsp; Esplora la stanza — alcuni oggetti nascondono segreti &nbsp; ✦</div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <button id="modal-close" aria-label="Chiudi">&times;</button>
            <div id="modal-icon"></div>
            <h2 id="modal-title"></h2>
            <div id="modal-divider"></div>
            <p id="modal-story"></p>
            <div id="modal-clue">
                <span class="clue-icon">🗝️</span>
                <span id="modal-clue-text"></span>
            </div>
            <div id="modal-badge"><span>✨ Indizio Sbloccato!</span></div>
        </div>
    </div>

    <div id="progress-bar">
        <div class="progress-label">
            <span class="progress-icon">🗺️</span>
            <span id="progress-text">0 / 7 segreti scoperti</span>
        </div>
        <div class="progress-items" id="progress-items"></div>
    </div>

    <button id="journal-btn" title="Diario degli indizi"><span>📜</span></button>
    <button id="hint-btn" title="Mostra suggerimento"><span>💡</span></button>
    <button id="reset-btn" title="Ricomincia"><span>🔄</span></button>

    <div id="journal-panel" class="hidden">
        <div class="journal-inner">
            <div class="journal-header">
                <h2 class="journal-title">📜 Diario degli Indizi</h2>
                <button id="journal-close" aria-label="Chiudi diario">&times;</button>
            </div>
            <div class="journal-entries" id="journal-entries"></div>
        </div>
    </div>

    <div id="celebration-overlay" class="hidden">
        <canvas id="confetti-canvas"></canvas>
        <div class="celebration-content">
            <h1 class="celebration-title">🏆 Mistero Risolto!</h1>
            <p class="celebration-subtitle">Hai scoperto tutti i segreti del laboratorio!</p>
            <div id="final-message"></div>
            <button id="celebration-close">Esplora di Nuovo</button>
        </div>
    </div>

    <script>
        const SCENE_W = 1280, SCENE_H = 714;

        const OBJECTS = [
            {
                id: 'calderone', icon: '🔥', name: 'Il Calderone Alchemico', mask: 'Imported_Image-1.png', bbox: [580, 362, 723, 465],
                story: 'Questo antico calderone di ferro battuto è stato forgiato nel XV secolo. Il fuoco blu che lo alimenta non è una fiamma ordinaria: è una reazione esotermica ottenuta mescolando sali di rame con alcol etilico. Gli alchimisti lo usavano per le loro trasmutazioni, convinti di poter trasformare il piombo in oro.',
                clue: 'La fiamma blu brucia a 1085°C — la temperatura di fusione del rame. Ricorda questo numero...'
            },
            {
                id: 'ampolla', icon: '⚗️', name: "L'Ampolla di Vetro", mask: 'Imported_Image-2.png', bbox: [741, 422, 793, 592],
                story: "Una sottile ampolla di vetro soffiato a mano, probabilmente di fattura veneziana. Contiene un liquido che cambia colore alla luce — un fenomeno detto fluorescenza, scoperto da George Stokes nel 1852. Sul fondo un'iscrizione incisa: \"Una goccia basta.\"",
                clue: 'Il liquido fluorescente reagisce alla luce ultravioletta. La parola chiave è LUCE.'
            },
            {
                id: 'libro', icon: '📖', name: 'Il Grimorio dei Segreti', mask: 'Imported_Image-3.png', bbox: [385, 503, 629, 601],
                story: "Il grimorio è aperto su una pagina coperta di simboli che sembrano muoversi sotto la luce tremolante. Contiene centinaia di ricette alchemiche trascritte in latino medievale. Una parola è sottolineata tre volte: ATTENZIONE.",
                clue: 'A pagina 42 si legge: "Aurum potabile" — l\'oro potabile era considerato l\'elisir della vita eterna.'
            },
            {
                id: 'lente', icon: '🔍', name: "La Lente d'Ingrandimento", mask: 'Imported_Image-4.png', bbox: [665, 616, 721, 655],
                story: "Attraverso questa lente convergente, i simboli sul tavolo appaiono completamente diversi. Le lenti furono perfezionate nel XIII secolo dai monaci benedettini.",
                clue: "La lente rivela ciò che è nascosto. Come la scienza, mostra ciò che l'occhio non vede."
            },
            {
                id: 'foglio', icon: '📄', name: 'Le Formule Segrete', mask: 'Imported_Image-5.png', bbox: [222, 197, 260, 241],
                story: "Un foglio ingiallito coperto di formule chimiche e diagrammi alchemici. L'inchiostro è ancora fresco — qualcuno era qui poco fa. Si riconoscono simboli alchemici per zolfo, mercurio e sale.",
                clue: 'Zolfo (🜍), Mercurio (☿), Sale (🜔) — i tre principi di Paracelso. La materia si TRASFORMA.'
            },
            {
                id: 'ampolla-verde', icon: '🧪', name: "L'Ampolla Verde", mask: 'Imported_Image-6.png', bbox: [336, 415, 387, 507],
                story: "Un'ampolla dal liquido verde brillante che pulsa debolmente. Il colore proviene dal solfato di rame disciolto. Paracelso diceva: \"Solo la dose fa il veleno.\"",
                clue: '"Solo la dose fa il veleno" — vale per ogni sostanza. Anche l\'acqua può essere letale in dosi eccessive!'
            },
            {
                id: 'cesto', icon: '🧺', name: 'Il Cesto delle Erbe', mask: 'Imported_Image-7.png', bbox: [224, 548, 298, 631],
                story: "Un cesto di vimini intrecciato contiene erbe essiccate dal profumo insolito. Si riconoscono artemisia, verbena e un'erba sconosciuta dalle foglie blu.",
                clue: 'Le erbe nascondono principi attivi. La chimica delle piante è la base della medicina moderna.'
            }
        ];

        const FINAL_MESSAGE = `
    <p><strong>🧬 Il Segreto del Laboratorio</strong></p>
    <p>Hai scoperto il filo conduttore: la <strong>TRASFORMAZIONE</strong>.</p>
    <p>Dall'alchimia alla chimica moderna, tutto ruota attorno al comprendere come la materia si trasforma.</p>
    <p style="margin-top:16px;font-size:1.15rem;">✨ <em>"Nulla si crea, nulla si distrugge, tutto si trasforma."</em><br>— Antoine Lavoisier</p>
`;

        let discoveredObjects = new Set();
        const objectLayers = {};

        // DOM refs
        const introScreen = document.getElementById('intro-screen');
        const scene = document.getElementById('scene');
        const maskLayer = document.getElementById('maskLayer');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalStory = document.getElementById('modal-story');
        const modalClueText = document.getElementById('modal-clue-text');
        const progressText = document.getElementById('progress-text');
        const progressItems = document.getElementById('progress-items');
        const journalBtn = document.getElementById('journal-btn');
        const journalPanel = document.getElementById('journal-panel');
        const journalEntries = document.getElementById('journal-entries');
        const celebOverlay = document.getElementById('celebration-overlay');
        const finalMessage = document.getElementById('final-message');
        const particleCanvas = document.getElementById('particle-canvas');

        /* ── INIT ── */
        function init() {
            try { const s = localStorage.getItem('lab_discovered'); if (s) discoveredObjects = new Set(JSON.parse(s)); } catch (e) { }
            buildScene();
            buildProgressBar();
            attachEvents();
            initParticles();
            updateProgress();
            updateJournal();
        }

        function saveState() {
            try { localStorage.setItem('lab_discovered', JSON.stringify([...discoveredObjects])); } catch (e) { }
        }

        /* ── BUILD SCENE ── */
        function buildScene() {
            OBJECTS.forEach(obj => {
                /*
                 * STRUTTURA:
                 *  maskLayer
                 *    └─ .hotspot-glow-wrap   ← opacity + filter:drop-shadow qui
                 *         └─ .hotspot-glow-inner  ← mask-image + background colorato
                 *
                 * Il drop-shadow viene applicato sul WRAPPER (nessuna maschera),
                 * quindi il blur si propaga liberamente fuori dalla sagoma.
                 * L'inner ha la maschera che ritaglia la forma e un background
                 * leggermente visibile che "alimenta" il drop-shadow.
                 */
                const wrap = document.createElement('div');
                wrap.className = 'hotspot-glow-wrap';

                const inner = document.createElement('div');
                inner.className = 'hotspot-glow-inner';
                inner.style.webkitMaskImage = `url(${obj.mask})`;
                inner.style.maskImage = `url(${obj.mask})`;

                wrap.appendChild(inner);
                maskLayer.appendChild(wrap);

                /* Hotspot invisibile per i click */
                const [x1, y1, x2, y2] = obj.bbox;
                const hotspot = document.createElement('div');
                hotspot.className = 'hotspot';
                hotspot.dataset.id = obj.id;
                hotspot.style.left = (x1 / SCENE_W * 100).toFixed(3) + '%';
                hotspot.style.top = (y1 / SCENE_H * 100).toFixed(3) + '%';
                hotspot.style.width = ((x2 - x1) / SCENE_W * 100).toFixed(3) + '%';
                hotspot.style.height = ((y2 - y1) / SCENE_H * 100).toFixed(3) + '%';
                scene.appendChild(hotspot);

                objectLayers[obj.id] = { wrap, inner, hotspot };

                /* Hover */
                hotspot.addEventListener('mouseenter', () => {
                    if (!wrap.classList.contains('active') && !wrap.classList.contains('discovered'))
                        wrap.classList.add('hover');
                });
                hotspot.addEventListener('mouseleave', () => {
                    if (!wrap.classList.contains('active'))
                        wrap.classList.remove('hover');
                });

                /* Click */
                hotspot.addEventListener('click', e => { e.stopPropagation(); onObjectClick(obj.id, e); });

                /* Stato già scoperto */
                if (discoveredObjects.has(obj.id)) wrap.classList.add('discovered');
            });
        }

        /* ── PROGRESS BAR ── */
        function buildProgressBar() {
            progressItems.innerHTML = '';
            OBJECTS.forEach(obj => {
                const item = document.createElement('div');
                item.className = 'progress-item'; item.id = `prog-${obj.id}`;
                item.textContent = obj.icon; item.title = obj.name;
                if (discoveredObjects.has(obj.id)) item.classList.add('found');
                progressItems.appendChild(item);
            });
        }

        /* ── EVENTS ── */
        function attachEvents() {
            document.getElementById('start-btn').addEventListener('click', () => {
                introScreen.classList.add('fade-out');
                setTimeout(() => introScreen.classList.add('hidden'), 1000);
            });
            document.getElementById('modal-close').addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
            document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeJournal(); removeHintTooltip(); } });
            document.getElementById('hint-btn').addEventListener('click', showHint);
            document.getElementById('reset-btn').addEventListener('click', resetGame);
            journalBtn.addEventListener('click', toggleJournal);
            document.getElementById('journal-close').addEventListener('click', closeJournal);
            journalPanel.addEventListener('click', e => { if (e.target === journalPanel) closeJournal(); });
            document.getElementById('celebration-close').addEventListener('click', () => celebOverlay.classList.add('hidden'));
            scene.addEventListener('click', e => {
                if (e.target === scene || e.target.classList.contains('scene-bg') ||
                    e.target.id === 'vignette-overlay' || e.target.id === 'maskLayer') clearActiveStates();
            });
        }

        /* ── OBJECT CLICK ── */
        function onObjectClick(objId, event) {
            const obj = OBJECTS.find(o => o.id === objId); if (!obj) return;
            const layers = objectLayers[objId];

            if (event) spawnClickParticles(event.clientX, event.clientY);

            const hint = document.getElementById('click-hint');
            if (hint) { hint.style.transition = 'opacity 0.5s'; hint.style.opacity = '0'; setTimeout(() => hint.remove(), 500); }

            clearActiveStates();
            layers.wrap.classList.add('active');

            const isNew = !discoveredObjects.has(objId);
            discoveredObjects.add(objId); saveState();
            openModal(obj, isNew); updateProgress();
            if (isNew) { journalBtn.classList.add('has-new'); updateJournal(); }
            if (discoveredObjects.size === OBJECTS.length) setTimeout(showCelebration, 1500);
        }

        /* ── CLEAR STATES ── */
        function clearActiveStates() {
            document.querySelectorAll('.hotspot-glow-wrap').forEach(el => el.classList.remove('active', 'hover'));
            OBJECTS.forEach(obj => {
                if (discoveredObjects.has(obj.id)) {
                    const l = objectLayers[obj.id];
                    if (l) l.wrap.classList.add('discovered');
                }
            });
        }

        /* ── TYPEWRITER ── */
        let twInterval = null;
        function typeWriter(text, el, speed = 25) {
            if (twInterval) { clearTimeout(twInterval); twInterval = null; }
            el.textContent = ''; let i = 0;
            function type() { if (i < text.length) { el.textContent += text.charAt(i++); twInterval = setTimeout(type, speed); } }
            type();
        }

        /* ── MODAL ── */
        function openModal(obj, isNew) {
            modalIcon.textContent = obj.icon; modalTitle.textContent = obj.name;
            typeWriter(obj.story, modalStory); modalClueText.textContent = obj.clue;
            const badge = document.getElementById('modal-badge');
            badge.style.display = 'block';
            badge.innerHTML = isNew ? '<span>✨ Indizio Sbloccato!</span>' : '<span>📌 Già Scoperto</span>';
            badge.style.color = isNew ? '' : 'var(--text-secondary)';
            modalOverlay.classList.remove('hidden');
        }
        function closeModal() {
            if (twInterval) { clearTimeout(twInterval); twInterval = null; }
            modalOverlay.classList.add('hidden'); clearActiveStates();
        }

        /* ── PROGRESS ── */
        function updateProgress() {
            progressText.textContent = `${discoveredObjects.size} / ${OBJECTS.length} segreti scoperti`;
            OBJECTS.forEach(obj => { const it = document.getElementById(`prog-${obj.id}`); if (it && discoveredObjects.has(obj.id)) it.classList.add('found'); });
        }

        /* ── JOURNAL ── */
        function toggleJournal() { journalPanel.classList.contains('hidden') ? openJournal() : closeJournal(); }
        function openJournal() { journalBtn.classList.remove('has-new'); updateJournal(); journalPanel.classList.remove('hidden'); }
        function closeJournal() { journalPanel.classList.add('hidden'); }
        function updateJournal() {
            journalEntries.innerHTML = '';
            OBJECTS.forEach(obj => {
                const isFound = discoveredObjects.has(obj.id);
                const entry = document.createElement('div');
                entry.className = `journal-entry ${isFound ? 'unlocked' : 'locked'}`;
                entry.innerHTML = `
            <div class="journal-entry-header">
                <span class="journal-entry-icon">${isFound ? obj.icon : '🔒'}</span>
                <span class="journal-entry-name">${isFound ? obj.name : '???'}</span>
            </div>
            <div class="journal-entry-clue">${isFound ? obj.clue : 'Indizio non ancora scoperto...'}</div>`;
                journalEntries.appendChild(entry);
            });
        }

        /* ── HINT ── */
        function showHint() {
            removeHintTooltip();
            const undiscovered = OBJECTS.filter(o => !discoveredObjects.has(o.id));
            if (!undiscovered.length) { showTooltip('🎉 Hai già scoperto tutti gli oggetti!'); return; }
            const target = undiscovered[Math.floor(Math.random() * undiscovered.length)];
            const l = objectLayers[target.id];
            if (l) {
                l.wrap.classList.add('hover'); l.hotspot.classList.add('hint-highlight');
                setTimeout(() => { l.wrap.classList.remove('hover'); l.hotspot.classList.remove('hint-highlight'); }, 3000);
            }
            showTooltip(`💡 Cerca ${target.icon} ${target.name}...`);
        }
        function showTooltip(text) {
            removeHintTooltip();
            const t = document.createElement('div'); t.className = 'hint-tooltip'; t.id = 'active-tooltip'; t.textContent = text;
            document.body.appendChild(t);
            setTimeout(() => { t.classList.add('fade-out'); setTimeout(() => t.remove(), 300); }, 3000);
        }
        function removeHintTooltip() { const e = document.getElementById('active-tooltip'); if (e) e.remove(); }

        /* ── RESET ── */
        function resetGame() {
            if (!confirm('Vuoi ricominciare? Tutti i progressi saranno persi.')) return;
            discoveredObjects.clear(); localStorage.removeItem('lab_discovered');
            document.querySelectorAll('.hotspot-glow-wrap').forEach(el => el.classList.remove('active', 'hover', 'discovered'));
            buildProgressBar(); updateProgress(); updateJournal();
        }

        /* ── CELEBRATION ── */
        function showCelebration() {
            closeModal(); finalMessage.innerHTML = FINAL_MESSAGE;
            celebOverlay.classList.remove('hidden'); launchConfetti();
        }
        function launchConfetti() {
            const canvas = document.getElementById('confetti-canvas'), ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const colors = ['#d4a844', '#f0d080', '#7744aa', '#4488cc', '#44aa66', '#ff6644', '#ff44aa'];
            const confetti = Array.from({ length: 150 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 10 + 5, h: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: Math.random() * 3 + 2, angle: Math.random() * Math.PI * 2,
                spin: (Math.random() - 0.5) * 0.2, drift: (Math.random() - 0.5) * 2
            }));
            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confetti.forEach(c => {
                    c.y += c.speed; c.x += c.drift; c.angle += c.spin;
                    ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle);
                    ctx.fillStyle = c.color; ctx.globalAlpha = Math.max(0, 1 - (c.y / canvas.height) * 0.5);
                    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h); ctx.restore();
                });
                if (++frame < 300 && !celebOverlay.classList.contains('hidden')) requestAnimationFrame(animate);
            }
            animate();
        }

        /* ── CLICK PARTICLES ── */
        function spawnClickParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div'); p.className = 'click-particle';
                p.style.setProperty('--dx', `${(Math.random() - 0.5) * 80}px`);
                p.style.left = `${x + (Math.random() - 0.5) * 14}px`; p.style.top = `${y + (Math.random() - 0.5) * 14}px`;
                p.style.animationDelay = `${Math.random() * 0.2}s`;
                document.body.appendChild(p); setTimeout(() => p.remove(), 1100);
            }
        }

        /* ── AMBIENT PARTICLES ── */
        function initParticles() {
            const ctx = particleCanvas.getContext('2d');
            function resize() { particleCanvas.width = particleCanvas.offsetWidth; particleCanvas.height = particleCanvas.offsetHeight; }
            resize(); window.addEventListener('resize', resize);
            const particles = Array.from({ length: 40 }, () => ({
                x: Math.random() * particleCanvas.width, y: Math.random() * particleCanvas.height,
                size: Math.random() * 2 + 0.5, speedY: -(Math.random() * 0.4 + 0.08), speedX: (Math.random() - 0.5) * 0.25,
                opacity: Math.random() * 0.4 + 0.08, flickerSpeed: Math.random() * 0.02 + 0.005, flickerOffset: Math.random() * Math.PI * 2
            }));
            function animate() {
                ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                particles.forEach(p => {
                    p.y += p.speedY; p.x += p.speedX;
                    const fl = Math.sin(Date.now() * p.flickerSpeed + p.flickerOffset) * 0.3 + 0.7;
                    if (p.y < -10) p.y = particleCanvas.height + 10;
                    if (p.x < -10) p.x = particleCanvas.width + 10;
                    if (p.x > particleCanvas.width + 10) p.x = -10;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212,168,68,${p.opacity * fl})`; ctx.fill();
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212,168,68,${p.opacity * fl * 0.12})`; ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
