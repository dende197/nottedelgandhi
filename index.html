<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Laboratorio Arcano — Esplora e Scopri</title>
    <meta name="description"
        content="Un laboratorio alchemico interattivo: clicca sugli oggetti, scopri le loro storie e risolvi il mistero!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="intro-screen">
        <div class="intro-particles"></div>
        <div class="intro-content">
            <h1 class="intro-title">Il Laboratorio Arcano</h1>
            <p class="intro-subtitle">Esplora gli oggetti e scopri i segreti dell'alchimia...</p>
            <button id="start-btn">
                <span class="btn-icon">🔮</span>
                <span>Inizia l'Esplorazione</span>
            </button>
        </div>
    </div>

    <!-- Contenitore che centra la scena mantenendo l'aspect ratio -->
    <div id="scene-container">
        <div class="scene-wrapper" id="scene">
            <video class="scene-bg" autoplay loop muted playsinline>
                <source src="Animated_elements_in_static_scene_63f6e98135.mp4" type="video/mp4">
            </video>
            <div id="vignette-overlay"></div>
            <div class="mask-layer" id="maskLayer"></div>
            <canvas id="particle-canvas"></canvas>
            <div id="click-hint">✦ &nbsp; Esplora la stanza — alcuni oggetti nascondono segreti &nbsp; ✦</div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <button id="modal-close" aria-label="Chiudi">&times;</button>
            <div id="modal-icon"></div>
            <h2 id="modal-title"></h2>
            <div id="modal-divider"></div>
            <p id="modal-story"></p>
            <div id="modal-clue">
                <span class="clue-icon">🗝️</span>
                <span id="modal-clue-text"></span>
            </div>
            <div id="modal-badge"><span>✨ Indizio Sbloccato!</span></div>
        </div>
    </div>

    <div id="progress-bar">
        <div class="progress-label">
            <span class="progress-icon">🗺️</span>
            <span id="progress-text">0 / 7 segreti scoperti</span>
        </div>
        <div class="progress-items" id="progress-items"></div>
    </div>

    <button id="journal-btn" title="Diario degli indizi"><span>📜</span></button>
    <button id="hint-btn" title="Mostra suggerimento"><span>💡</span></button>
    <button id="reset-btn" title="Ricomincia"><span>🔄</span></button>

    <div id="journal-panel" class="hidden">
        <div class="journal-inner">
            <div class="journal-header">
                <h2 class="journal-title">📜 Diario degli Indizi</h2>
                <button id="journal-close" aria-label="Chiudi diario">&times;</button>
            </div>
            <div class="journal-entries" id="journal-entries"></div>
        </div>
    </div>

    <div id="celebration-overlay" class="hidden">
        <canvas id="confetti-canvas"></canvas>
        <div class="celebration-content">
            <h1 class="celebration-title">🏆 Mistero Risolto!</h1>
            <p class="celebration-subtitle">Hai scoperto tutti i segreti del laboratorio!</p>
            <div id="final-message"></div>
            <button id="celebration-close">Esplora di Nuovo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
